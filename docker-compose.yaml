services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inbraille
    environment:
      PORT: "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped